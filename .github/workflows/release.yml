name: Build and Release

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[可发布]')
    
    steps:
    - name: Acknowledge trigger
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ 收到测试通过通知，开始构建和发布流程...'
          });
    
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
    
    - name: Build
      run: cd service-pool && mvn -B clean package -DskipTests
    
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 发布说明
          
          此 Release 由测试框架自动触发。
          
          **测试框架：** ${{ github.repository }}
          **触发时间：** ${{ github.event.issue.created_at }}
          **测试通过 Issue：** #${{ github.event.issue.number }}
        draft: false
        prerelease: false
        files: |
          service-pool/target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Publish to GitHub Packages
      run: cd service-pool && mvn -B deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Close trigger issue on success
      if: success()
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.update({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'closed'
          });
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ 构建和发布成功！\n\n**Release：** https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}\n**GitHub Packages：** https://github.com/${{ github.repository }}/packages`
          });
    
    - name: Comment on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ 构建失败，请检查日志。'
          });
