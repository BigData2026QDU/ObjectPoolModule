name: Build and Release

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[可发布]')
    
    steps:
    - name: Acknowledge trigger
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ 收到测试通过通知，开始构建和发布流程...'
          });
    
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
    
    - name: Build
      run: cd service-pool && mvn -B clean package -DskipTests
    
    - name: Get version
      id: version
      run: |
        cd service-pool
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      if: success()
      run: |
        cd service-pool
        gh release create "v${{ steps.version.outputs.version }}" \
          target/*.jar \
          --title "Release v${{ steps.version.outputs.version }}" \
          --notes "## 发布说明

        此 Release 由测试框架自动触发。

        **测试框架：** ${{ github.repository }}
        **触发时间：** ${{ github.event.issue.created_at }}
        **测试通过 Issue：** #${{ github.event.issue.number }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Publish to GitHub Packages
      if: success()
      run: cd service-pool && mvn -B deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Close trigger issue on success
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.issues.update({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'closed'
          });
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ 构建和发布成功！\n\n**Release：** https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}\n**GitHub Packages：** https://github.com/${{ github.repository }}/packages`
          });
    
    - name: Comment on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ 构建失败，请检查日志。'
          });
